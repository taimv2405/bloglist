name: Periodic health check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://bloglist-7p9l.onrender.com/health
          max-attempts: 3
          retry-delay: 5s
